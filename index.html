<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor CRM | Inteligência de Pipeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              nexus: {
                900: '#050B14', // Deepest background
                800: '#0A1221', // Secondary background
                700: '#111C30', // Card background
                600: '#1C2B45', // Border/Hover
                accent: '#00D4FF', // Cyan Electric
                dim: '#007090', // Dim Cyan
                text: '#E2E8F0', // Main text
                muted: '#94A3B8', // Muted text
              }
            },
            backgroundImage: {
              'glow-gradient': 'radial-gradient(circle at center, rgba(0, 212, 255, 0.08) 0%, transparent 70%)',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #050B14;
        color: #E2E8F0;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #050B14;
      }
      ::-webkit-scrollbar-thumb {
        background: #1C2B45;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #2D4060;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
